<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarot Reading App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🔮 Tarot Decision Maker</h1>
    <p>Ask a question and let the cards guide you.</p>
  </header>

  <main>
    <div class="input-area">
      <input type="text" id="userQuestion" placeholder="Type your question here...">
      <button id="drawButton">Draw Your Tarot Reading</button>
    </div>

    <div class="cards"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
